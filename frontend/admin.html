<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #f5f6fa;
    }

    .navbar {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #007bff;
      color: white;
    }

    button {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      background: green;
      color: white;
      cursor: pointer;
    }

    .logs {
      background: black;
      color: lime;
      height: 150px;
      overflow-y: auto;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="navbar">🏪 Admin Dashboard</div>

<div class="container">

  <div class="card">
    <h3>🚚 Active Deliveries</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Status</th>
          <th>Bot</th>
          <th>Items</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="inProgress"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>📦 Completed Deliveries</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Status</th>
          <th>Bot</th>
          <th>Items</th>
        </tr>
      </thead>
      <tbody id="delivered"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>📜 Logs</h3>
    <div class="logs" id="logs"></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
