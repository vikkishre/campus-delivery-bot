<!DOCTYPE html>
<html>
<head>
  <title>Campus Delivery</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f6f9;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #qrModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    #qrBox {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>🛒 Place Order</h2>

<!-- Stationery -->
<div class="card">
  <h3>📚 Stationery</h3>
  <div id="itemsContainer"></div>
</div>

<!-- Electronics -->
<div class="card">
  <h3>🔌 Electronic Components</h3>
  <textarea id="customComponents"
    placeholder="Arduino, sensors, wires..."
    rows="3" style="width:100%;">
  </textarea>
</div>

<button onclick="createOrder()">Place Order</button>

<h3 id="orderInfo"></h3>

<button onclick="openQR()">Open QR</button>
<button onclick="goToTracking()">Track</button>

<!-- QR Modal -->
<div id="qrModal">
  <div id="qrBox">
    <canvas id="qrcode"></canvas>
    <br><br>
    <button onclick="closeQR()">Close</button>
  </div>
</div>
<button onclick="goToAdmin()">Admin Panel</button>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="script.js"></script>

</body>
</html>
